---

- name: "Install RKE2"
  ansible.builtin.shell:
    cmd: "/tmp/rke2.sh"
  args:
    executable: /bin/bash
    # creates: /usr/local/bin/rke2
  environment:
    INSTALL_RKE2_CHANNEL: "{{ rke2_channel }}"
    INSTALL_RKE2_VERSION: "{{ rke2_version }}"
  when: (rke2_version != ( installed_rke2_version.stdout | default({})) ) or ((installed_rke2_version is not defined) )
  register: rke2_install

# - name: Copy Custom Manifests
#   ansible.builtin.template:
#     src: "{{ item }}.j2"
#     dest: "{{ rke2_data_path }}/server/manifests/{{ item }}"
#     owner: root
#     group: root
#     mode: "0o644"
#   with_items: "{{ rke2_custom_manifests }}"
#   when: rke2_custom_manifests

- name: "Make sure that rke2-server is started"
  ansible.builtin.service:
    name: rke2-server
    enabled: true
    state: started
  register: rke2_start

- name: "Restart rke2-server"
  ansible.builtin.service:
    name: rke2-server
    enabled: true
    state: restarted
  when: not rke2_start.changed and (rke2_install.changed or config_file.changed)

- name: "Wait until node is ready"
  ansible.builtin.shell: |
    kubectl get node {{ ansible_facts['hostname'] }} -o jsonpath='{.status.conditions[?(@.type=="Ready")].status}'
  register: node_ready
  until: node_ready.stdout == "True"
  retries: 30
  delay: 10
  environment:
    PATH: "/var/lib/rancher/rke2/bin:{{ ansible_env.PATH }}"
    KUBECONFIG: /etc/rancher/rke2/rke2.yaml
  changed_when: false

...
